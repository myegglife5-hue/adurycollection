<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Details | Adury Collection</title>

<link rel="stylesheet" href="style.css">
<script src="script.js"></script>

<style>
.product{
max-width:1200px;
margin:40px auto;
display:grid;
grid-template-columns:1fr 1fr;
gap:40px;
padding:20px;
}

.product img{
width:100%;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.15);
}

.price{
font-size:32px;
color:#e60023;
font-weight:bold;
margin:15px 0;
}

.badge{
display:inline-block;
background:#ff0000;
color:#fff;
padding:8px 15px;
border-radius:30px;
font-size:14px;
margin-bottom:15px;
animation:blink 1s infinite;
}

.buy-btn{
width:100%;
padding:16px;
margin-top:15px;
background:#ff3b30;
color:#fff;
border:none;
font-size:20px;
font-weight:bold;
border-radius:10px;
cursor:pointer;
animation:pulse 1s infinite;
}

.whatsapp-btn{
width:100%;
padding:16px;
margin-top:10px;
background:#25D366;
color:#fff;
border:none;
font-size:20px;
font-weight:bold;
border-radius:10px;
cursor:pointer;
}

@keyframes pulse{
50%{
transform:scale(1.03);
}
}

@keyframes blink{
50%{
opacity:.6;
}
}
</style>

</head>

<body>

<div class="product">

<div>
<img src="https://picsum.photos/600/700" alt="Product">
</div>

<div>

<div class="badge">🔥 আজকের অফার</div>

<h1>Premium Cotton Three Piece</h1>

<div class="price">৳650</div>

<p>
✔️ 100% সুতি কাপড়<br>
✔️ ফ্রি সাইজ<br>
✔️ ডিজিটাল প্রিন্ট<br>
✔️ সারা বাংলাদেশে হোম ডেলিভারি
</p>

<button class="buy-btn"
onclick="addToCart('Premium Cotton Three Piece',650,'https://picsum.photos/600/700')">
🛒 কার্টে যোগ করুন
</button>

<button class="whatsapp-btn"
onclick="location.href='checkout.html'">
🔥 এখনই অর্ডার করুন
</button>

</div>

</div>

</body>
</html>
