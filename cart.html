<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopping Cart</title>

<link rel="stylesheet" href="style.css">
<script src="script.js"></script>

<style>
.cart-box{
max-width:900px;
margin:30px auto;
background:#fff;
padding:20px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.cart-item{
display:flex;
justify-content:space-between;
padding:15px 0;
border-bottom:1px solid #ddd;
}

.checkout-btn{
width:100%;
padding:15px;
background:#ff3b30;
color:#fff;
font-size:20px;
border:none;
border-radius:10px;
margin-top:20px;
cursor:pointer;
animation:blink 1s infinite;
}

@keyframes blink{
50%{opacity:.6;}
}
</style>

</head>

<body>

<header>
<div class="container">
<nav>
<div class="logo">Adury Collection</div>
</nav>
</div>
</header>

<div class="cart-box">

<h2>🛒 আপনার কার্ট</h2>

<div id="cartItems"></div>

<h3 id="total">মোট: ৳0</h3>

<button class="checkout-btn" onclick="location.href='checkout.html'">
🔥 এখনই অর্ডার করুন
</button>

</div>

<script>

let cart=JSON.parse(localStorage.getItem("cart"))||[];

let html="";

let total=0;

cart.forEach(item=>{

total+=item.price;

html+=`
<div class="cart-item">
<div>${item.name}</div>
<div>৳${item.price}</div>
</div>
`;

});

document.getElementById("cartItems").innerHTML=html;

document.getElementById("total").innerHTML="মোট: ৳"+total;

</script>

</body>
</html>
