<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout | Adury Collection</title>

<link rel="stylesheet" href="style.css">

<style>
body{
background:#f5f5f5;
font-family:Arial,sans-serif;
}

.checkout{
max-width:650px;
margin:40px auto;
background:#fff;
padding:25px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,.1);
}

.checkout h2{
text-align:center;
margin-bottom:20px;
color:#222;
}

.checkout input,
.checkout textarea{
width:100%;
padding:15px;
margin-bottom:15px;
border:1px solid #ddd;
border-radius:8px;
font-size:16px;
outline:none;
}

.checkout input:focus,
.checkout textarea:focus{
border-color:#25D366;
}

.order-btn{
width:100%;
padding:16px;
background:#25D366;
color:#fff;
border:none;
border-radius:10px;
font-size:20px;
font-weight:bold;
cursor:pointer;
animation:pulse 1s infinite;
}

.order-btn:hover{
background:#1ea952;
}

@keyframes pulse{
50%{
transform:scale(1.03);
}
}
</style>

</head>

<body>

<div class="checkout">

<h2>🛍️ অর্ডার সম্পন্ন করুন</h2>

<input type="text" id="name" placeholder="আপনার নাম">

<input type="tel" id="phone" placeholder="মোবাইল নাম্বার">

<textarea id="address" rows="4" placeholder="সম্পূর্ণ ঠিকানা"></textarea>

<button class="order-btn" onclick="sendOrder()">
🔥 এখনই WhatsApp-এ অর্ডার করুন
</button>

</div>

<script>

function sendOrder(){

let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let address=document.getElementById("address").value;

let cart=JSON.parse(localStorage.getItem("cart"))||[];

if(name==""||phone==""||address==""){
alert("অনুগ্রহ করে সব তথ্য পূরণ করুন।");
return;
}

let total=0;

let message="🛍️ *Adury Collection*%0A";
message+="====================%0A";

cart.forEach((item,index)=>{
total+=item.price;
message+=(index+1)+". "+item.name+" - ৳"+item.price+"%0A";
});

message+="====================%0A";
message+="💰 মোট মূল্য: ৳"+total+"%0A%0A";

message+="👤 নাম: "+name+"%0A";
message+="📞 মোবাইল: "+phone+"%0A";
message+="📍 ঠিকানা: "+address;

window.open("https://wa.me/8801969080416?text="+message,"_blank");

}

</script>

</body>
</html>
