<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adury Collection</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

header{
background:#111;
color:#fff;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:26px;
font-weight:bold;
color:#00d084;
}

nav a{
color:#fff;
text-decoration:none;
margin-left:15px;
}

.hero{
background:#00d084;
color:#fff;
text-align:center;
padding:60px 20px;
}

.hero h1{
font-size:34px;
margin-bottom:10px;
}

.hero p{
font-size:18px;
margin-bottom:20px;
}

.btn{
background:#111;
color:#fff;
padding:12px 25px;
border-radius:8px;
text-decoration:none;
}

.products{
padding:40px 20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.card{
background:#fff;
border-radius:10px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.card img{
width:100%;
}

.card h3{
padding:10px;
}

.price{
padding:0 10px 10px;
color:#00b26b;
font-size:20px;
font-weight:bold;
}

footer{
background:#111;
color:#fff;
text-align:center;
padding:20px;
margin-top:30px;
}
</style>

</head>
<body>

<header>
<div class="logo">Adury Collection</div>

<nav>
<a href="#">Home</a>
<a href="#">Shop</a>
<a href="#">Contact</a>
</nav>

</header>

<section class="hero">

<h1>Premium Three Piece Collection</h1>

<p>Wholesale & Retail Available</p>

<a class="btn" href="#">Shop Now</a>

</section>

<section class="products">

<div class="card">

<img src="https://picsum.photos/400/500" alt="">

<h3>Cotton Three Piece</h3>

<div class="price">৳650</div>

</div>

<div class="card">

<img src="https://picsum.photos/401/500" alt="">

<h3>Premium Collection</h3>

<div class="price">৳850</div>

</div>

</section>

<footer>

© 2026 Adury Collection

</footer>

</body>
</html>
